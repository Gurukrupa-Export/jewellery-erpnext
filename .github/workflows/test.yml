name: Frappe App Tests

on:
  pull_request:
    branches: [ "main", "develop_aerele" ]
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: travis
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ptravis"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:6
        ports:
          - 6379:6379

    env:
      DB: mariadb
      TYPE: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            redis-server \
            mariadb-client \
            redis-tools \
            wkhtmltopdf \
            build-essential \
            libffi-dev \
            libssl-dev

      - name: Make script executable
        run: chmod +x install.sh

      - name: Run Frappe Install Script
        run: ./install.sh
        
      - name: Run Tests
        run: |
          cd ~/frappe-bench
          bench --site test_site run-tests --app jewellery_erpnext --skip-test-records
