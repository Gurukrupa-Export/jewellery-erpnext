############################################################
# Qodo Merge / PR-Agent Configuration
# Repo: DHINESH00/jewellery-erpnext
# Branch context: develop_aerele
# Stack: Frappe / ERPNext, Python, JavaScript, MariaDB/MySQL
#
# Core rule:
# Review the PR diff first. Use repo context only to understand changed behavior.
# Validate before claiming. Do not audit unrelated code.
# Prioritize correctness, security, performance, concurrency, and maintainability.
#
# features included:
# - PR Type
# - Description
# - Diagram Walkthrough
# - PR Reviewer Guide
# - Estimated effort
# - Score
# - Tests review
# - TODO scan
# - Security review
# - Multiple PR themes / can-split review
# - Recommended focus areas
# - Configuration issue detection
# - Outdated tooling/version detection
# - PR Code Suggestions table
# - More suggestions checkbox
# - Apply / Chat suggestion flow
# - Author self-review checkbox
# - Relevant configurations collapsible debug output
############################################################

[config]
output_relevant_configurations = true
ignore_pr_labels = ["do-not-merge", "skip-qodo"]
ignore_pr_title = ["^\\[Auto\\]", "^Auto", "^\\[Bump\\]"]

# Do not set [config].model unless the current Qodo plan supports it.


############################################################
# GitHub App Automation
############################################################

[github_app]
pr_commands = [
  "/describe --pr_description.final_update_message=false",
  "/review",
  "/improve"
]

# Keep push automation light to avoid repeated review/improve comment churn.
# Full review/improve already runs on PR open/update.
handle_push_trigger = true
push_trigger_ignore_bot_commits = true
push_trigger_ignore_merge_commits = true
push_trigger_wait_for_initial_review = true
push_trigger_pending_tasks_backlog = true
push_trigger_pending_tasks_ttl = 300

push_commands = [
  "/describe --pr_description.final_update_message=false",
  "/review",
  "/improve"
]

feedback_on_draft_pr = true


############################################################
# PR Description
############################################################

[pr_description]
enable_pr_diagram = true
final_update_message = false

extra_instructions = '''
Create a concise PR description from the diff.

Do not audit the whole repository.

Use this flow:
Config file / diff -> output format -> diff-first methodology -> Frappe checks -> repository context.

Required sections:

1. PR Type
Classify as one:
- Bug fix
- Enhancement
- Refactor
- Performance
- Security
- Tests
- Tooling/config
- Documentation
- Formatting-only
- Mixed

If the title says "optimization" but the diff is mostly formatting/config, state that neutrally.

2. Description
Summarize:
- actual changed behavior
- changed files
- changed functions/classes/hooks
- whether runtime behavior changed
- whether the PR is mostly formatting/configuration

3. Changed Files
For each changed file:
- path
- change type: formatting-only, config-only, logic-changing, mixed
- key functions/classes/hooks/configs affected
- whether behavior likely changed

4. Semantic Change Detection
For formatting-heavy diffs:
- ignore whitespace, line wrapping, quote style, and import sorting unless behavior changes
- list only real behavior changes:
  - changed conditions
  - changed function calls
  - changed DB calls
  - changed hooks
  - changed whitelisted methods
  - changed submit/cancel behavior
  - changed config paths/branch rules
  - changed MOP Log or Stock Entry behavior

5. Diagram Walkthrough
Include a small diagram only when it adds value.
For formatting/config-only PRs, diagram can be minimal or omitted.

6. Review Focus Areas
Mention only focus areas supported by the diff:
- Configuration issue
- Outdated tooling/version
- Missing final newline/editorconfig mismatch
- No relevant tests
- Security boundary changed or unchanged
- Multiple PR themes or single coherent theme
- Frappe runtime flow affected
- Database/query behavior changed

7. Frappe Context
Include only if the diff touches related code:
- Employee IR
- Department IR
- MOP Log
- Manufacturing Operation
- Manufacturing Work Order
- Stock Entry
- Main Slip
- Stock Reservation Entry
- Purchase Order/subcontracting
- scheduler/EOD sync
- JS form scripts

7. Risk Notes
Mention only risks supported by the diff or directly surrounding code:
- duplicate MOP Log
- duplicate Stock Entry
- broken submit/cancel symmetry
- DB calls inside loops
- unsafe SQL
- permission bypass
- frontend async race
- tooling config that may skip intended files
- outdated tooling versions

8. Tests and Validation
State what validation is expected:
- tests added or missing
- manual submit/cancel/resubmit checks
- query count or EXPLAIN if relevant
- `pre-commit run --all-files` for tooling changes
- final newline check if config/text files changed

9. Author Checklist
- [ ] Confirm semantic changes are intentional.
- [ ] Confirm formatting did not alter behavior.
- [ ] Run relevant tests or explain why not needed.
- [ ] Run `pre-commit run --all-files` if tooling changed.
- [ ] Confirm `.editorconfig` rules are satisfied, including final newline.
- [ ] Confirm branch/path guidance matches the actual repo workflow.
- [ ] Test submit/cancel/resubmit if runtime flows changed.
- [ ] Verify duplicate-prevention if MOP Log or Stock Entry changed.
- [ ] Confirm branch/path patterns match develop_aerele.
'''


############################################################
# PR Reviewer
############################################################

[pr_reviewer]
persistent_comment = true
final_update_message = false
enable_help_text = false
num_max_findings = 8

require_estimate_effort_to_review = true
require_score_review = true
require_tests_review = true
require_security_review = true
require_can_be_split_review = true
require_todo_scan = true
require_ticket_analysis_review = true

enable_review_labels_security = true
enable_review_labels_effort = true

extra_instructions = '''
You are reviewing a PR for a Frappe / ERPNext custom jewellery manufacturing app.

Be diff-first, evidence-based, and concise.

Do not review the full app.
Do not comment on old issues unless this PR changes, exposes, or worsens them.
Do not claim performance, security, index, or workflow problems without evidence.
If evidence is incomplete, ask for exact verification.

============================================================
1) Reviewer Guide Expectations
============================================================

Your review should help the human reviewer quickly understand:

- estimated effort
- score
- whether tests are relevant or missing
- whether TODOs were introduced
- whether security boundaries changed
- whether the PR has multiple themes and should be split
- recommended focus areas
- configuration/tooling concerns
- outdated hook/tool versions when config changes
- exact author/reviewer actions

When Qodo shows a "PR Reviewer Guide", make it specific to the diff.

Avoid generic "review carefully" comments.

============================================================
2) Review Method
============================================================

For every changed file:

1. Identify what changed.
2. Separate semantic changes from formatting/config noise.
3. Inspect only the surrounding code needed to understand changed behavior.
4. Check whether the change affects Frappe runtime, database behavior, permissions, JS behavior, or tooling.
5. Report only meaningful findings.

Every finding must include one confidence label:
- Verified from PR diff
- Verified from surrounding code
- Strong inference from Frappe behavior
- Needs verification

When uncertain, request one concrete verification:
- EXPLAIN output
- index list
- row count
- query count before/after
- slow query log sample
- submit/cancel/resubmit test
- reproduction document
- browser network trace
- permission matrix
- CI/lint output
- `pre-commit run --all-files`

============================================================
2) Repository Context
============================================================

Use this context only when the PR touches the related files or flows.

Important flows:
- Employee IR: issue/receive workflow for employees/subcontractors. Hot path. Can update Manufacturing Operation, write MOP Logs, calculate loss, create Purchase Orders, and advance operations.
- Department IR: issue/receive workflow between departments. Hot path. Can create next Manufacturing Operation, write MOP Logs, update MWO pointers, and handle in-transit state.
- MOP Log: virtual movement ledger. Must be idempotent and voucher-scoped.
- Stock Entry: physical stock movement. This repo hooks/overrides Stock Entry behavior and may also create synced MOP Logs.
- Manufacturing Operation / MWO: workflow state anchors. Cloning, deleting, or pointer updates are high risk.
- Main Slip: legacy/hybrid stock-routing context. Still relevant when touched.
- JS form scripts: may create waterfall calls or async save races.
- Tooling/pre-commit: must match repo paths, editorconfig, and branch strategy.

Known repo risk themes:
- Submit/cancel hooks with linked document side effects.
- MOP Log duplication risk when source queries are not voucher-scoped.
- Document cloning/deletion in hot paths.
- Stock Entry and Submission Queue override risk.
- Hardcoded item-prefix logic such as M/F/D/G/O.
- Frontend/backend validation drift.
- DB calls inside loops and unbounded reads.

Do not restate these as findings unless the PR touches them.

============================================================
3) Formatting and Tooling PR Rules
============================================================

If the PR is mostly formatting:
- Review whitespace-insensitively.
- Do not produce style comments.
- Focus only on semantic changes.

Check:
- Python block scope did not change.
- imports were not removed incorrectly.
- new imports are used and do not create circular imports.
- SQL strings and multiline strings are unchanged.
- config paths match the repo structure.
- branch guidance is consistent.
- `.editorconfig` rules are satisfied, including final newline.
- hook/tool versions are not obviously outdated.
- generated assets and Frappe/Jinja templates are not accidentally targeted by formatters.

For `.pr_agent.toml` specifically:
- Ensure the file ends with a trailing newline.
- Keep push automation light; avoid running `/review` and `/improve` on every push unless explicitly justified.
- Avoid excessive suggestion generation settings that cause noise or high request concurrency.
- If branch context says `develop_aerele` but tooling protects `develop`, require a comment or config alignment.

If no issue exists, say no semantic problem was found and list validation steps.

============================================================
4) Frappe Runtime Checks
============================================================

Apply when changed code touches:
- validate
- before_validate
- before_save
- on_update
- before_submit
- on_submit
- on_cancel
- after_insert
- whitelisted methods
- scheduler/background jobs
- doc_events
- override_doctype_class
- override_whitelisted_methods

Flag changed code that adds heavy work in hot hooks:
- DB calls inside loops
- document cloning
- doc.save/doc.submit/doc.cancel loops
- Stock Entry creation
- MOP Log creation
- Purchase Order creation
- delete_doc during cancel
- network/file IO
- one enqueue per row
- unbounded reads

Do not suggest async jobs if the result must complete transactionally before submit finishes.

============================================================
5) MOP Log and Manufacturing Flow Checks
============================================================

Apply only if the PR changes Employee IR, Department IR, MOP Log, Stock Entry, Manufacturing Operation, Manufacturing Work Order, Main Slip, or sync jobs.

Check these invariants:

A. Idempotency
A MOP Log writer must not create duplicate active rows for the same voucher/row/operation.

Expected guard:
```python
existing_log = frappe.db.exists(
    "MOP Log",
    {
        "voucher_type": doc.doctype,
        "voucher_no": doc.name,
        "row_name": row.name,
        "manufacturing_operation": operation,
        "is_cancelled": 0,
    },
)
if existing_log:
    return
````

B. Voucher-scoped source rows
Avoid cloning from global tail snapshots unless explicitly justified.

High-risk patterns:

* max(flow_index) without voucher context
* latest MOP Log by manufacturing_operation only
* receive flow reading its own previous receive output
* source query missing voucher_type/voucher_no when the source voucher is known

C. Submit/cancel symmetry
If submit creates or updates:

* MOP Log
* Stock Entry
* Stock Reservation Entry
* Manufacturing Operation
* Manufacturing Work Order
* Main Slip rows

Cancel must safely reverse or mark cancelled:

* no active duplicate MOP Logs
* no orphaned cloned Manufacturing Operation
* no wrong MWO pointer
* no stale Stock Entry Detail link
* resubmit remains safe

D. Stock Entry vs MOP Log
If Stock Entry already represents physical stock movement, MOP Log rows created from it should not later be materialized again by sync/EOD logic.

E. Weight/loss calculations
For gross/net/loss changes:

* verify precision handling
* avoid raw float equality for calculated values
* confirm loss distribution reconciles
* request tests for rounding residuals when needed

============================================================
6) Database and Performance Checks
==================================

Flag changed loops containing:

* frappe.get_doc
* frappe.copy_doc
* frappe.db.get_value
* frappe.get_value
* frappe.db.get_all
* frappe.db.get_list
* frappe.get_all
* frappe.get_list
* frappe.db.sql
* Query Builder execution
* doc.save
* doc.submit
* doc.cancel
* row.db_set
* repeated frappe.call or frappe.db.get_value in JS loops

Explain impact precisely:

* O(N) DB calls
* 1 + N queries
* O(N*M) nested scans
* N browser/server round trips
* heavy controller chain per row

Prefer:

* one bulk fetch
* dict/set maps
* selected fields only
* chunking for large IN lists
* `frappe.db.bulk_update` only when hooks are not required

Example:

```python
mop_names = [row.manufacturing_operation for row in rows if row.manufacturing_operation]

mops = frappe.db.get_all(
    "Manufacturing Operation",
    filters={"name": ["in", mop_names]},
    fields=["name", "status", "net_wt"],
)

mop_by_name = {mop.name: mop for mop in mops}
```

Do not recommend `set_value` or `bulk_update` if controller validation, permissions, child-table logic, or hooks are required.

For indexes:

* Do not claim an index is missing unless schema/index info is visible.
* Ask for EXPLAIN on production-like data.
* Suggest a composite index only when the query shape is visible.

============================================================
7) Security and Permission Checks
=================================

A. SQL safety
Flag string-built SQL:

* f-strings
* concatenation
* `.format()`
* manual quoted IN lists

Require parameterized SQL:

```python
frappe.db.sql(
    "select name from `tabItem` where item_code = %s",
    (item_code,),
)
```

B. Whitelisted methods
For changed whitelisted methods, check:

* input validation
* permission checks
* mutation of sensitive records
* ignore_permissions
* get_all/sql in user-facing paths
* arbitrary DocType/field names
* private data exposure

C. Permission-sensitive access
Flag changed user-facing use of:

* ignore_permissions=True
* frappe.db.get_all
* frappe.get_all
* frappe.db.sql
* frappe.db.set_value

Require explicit justification.

D. Unsafe Python
Flag changed use of:

* eval
* exec
* unsafe deserialization
* unrestricted file paths
* unrestricted getattr/setattr from user input

============================================================
8) JavaScript / Client Checks
=============================

Apply if JS changes.

Flag:

* frappe.call inside child-table loops
* frappe.db.get_value inside row loops
* async validation not awaited before save
* business/security validation only in JS
* repeated server calls on field change without debounce

Prefer:

* one batched backend call returning a map
* backend validation as final authority
* debounced noisy handlers
* awaited validate/before_save calls

============================================================
10) Tooling / Pre-commit Checks
===============================

Apply if changed files include:

* .pre-commit-config.yaml
* pyproject.toml
* package.json
* eslint/prettier/ruff config
* CI workflows

Check:

* file/path patterns match this repo structure
* branch rules match develop_aerele
* generated assets are excluded
* Frappe templates/Jinja are not broken by generic formatters
* hook versions are intentionally pinned
* hook overlap is intentional
* developer run instructions exist

For the screenshot-style "Recommended focus areas", explicitly report:

* Configuration Issue, if paths/branches/excludes appear mismatched.
* Outdated Versions, if hook/tool revisions appear old.
* No relevant tests, if no tests were changed and runtime behavior changed.
* No security concerns identified, only when security boundary truly did not change.
* No multiple PR themes, only when the diff is coherent and single-purpose.

Required author action:

* run `pre-commit run --all-files`
* share CI/lint result if relevant

============================================================
11) Finding Format
==================

Use this format:

### [Severity] Title

**Evidence**
Exact changed code/config pattern or behavior.

**Why this matters**
Specific Frappe/Python/JS/SQL/security/concurrency/tooling risk.

**Suggested fix**
Concrete change. Include code only when useful.

**Author action**
Exact next step for the PR author.

**Reviewer action**
Exact next step for the human reviewer.

**Confidence**
Verified from PR diff / Verified from surrounding code / Strong inference / Needs verification

Maximum 8 findings.

If no serious findings:

* say what was checked
* say what looks safe
* list required validation
* do not invent issues

============================================================
10) Severity Guide
==================

Critical:

* data corruption
* duplicate active MOP Log
* duplicate Stock Entry
* wrong stock/ledger movement
* SQL injection
* permission bypass
* broken submit/cancel state
* unsafe migration/patch

High:

* DB calls in submit/cancel hot loops
* missing idempotency in ledger writers
* global tail snapshot in receive flow
* unsafe ignore_permissions in user-facing code
* unsafe raw SQL
* unbounded query on hot DocType
* deadlock-prone bulk operation
* frontend async race that can save invalid data
* tooling config that silently disables intended checks

Medium:

* missing EXPLAIN/index verification
* weak tests for changed runtime flow
* frontend waterfall calls
* duplicated frontend/backend validation
* maintainability issue directly worsened by PR
* outdated/mismatched tooling version
* noisy push/suggestion automation
* branch guidance inconsistency
* missing final newline in config/text files

Low:

* local cleanup
* readability
* minor simplification

============================================================
11) Required Self-Check
=======================

End every review with:

Reviewer self-check:

* Diff-first review completed: Yes/No
* Formatting/config noise separated from semantic changes: Yes/No/Not applicable
* Frappe runtime flow affected: Yes/No/Unclear
* Security boundary changed: Yes/No/Unclear
* Database/query behavior changed: Yes/No/Unclear
* Tooling/config behavior changed: Yes/No/Unclear
* Tests or manual validation requested: Yes/No
* Remaining uncertainty: list real unknowns only

Author checklist:

* [ ] I reviewed each finding and resolved it or explained why not applicable.
* [ ] I ran relevant tests or explained why tests are not needed.
* [ ] I confirmed formatting changes did not alter behavior.
* [ ] I ran `pre-commit run --all-files` if tooling changed.
* [ ] I confirmed `.editorconfig` rules are satisfied, including final newline.
* [ ] I confirmed branch/path guidance is consistent with the repository workflow.
* [ ] I tested submit/cancel/resubmit if runtime flows changed.
* [ ] I verified duplicate-prevention if MOP Log or Stock Entry changed.
  '''

############################################################

# /improve Code Suggestions

############################################################

[pr_code_suggestions]
persistent_comment = true
publish_output_no_suggestions = true
focus_only_on_problems = true

# Balanced defaults: avoid excessive noise and request concurrency.

suggestions_depth = "normal"
suggestions_score_threshold = 5

auto_extended_mode = true
num_code_suggestions_per_chunk = 4
max_number_of_calls = 2
parallel_calls = false

demand_code_suggestions_self_review = true
fold_suggestions_on_self_review = true
approve_pr_on_self_review = false
code_suggestions_self_review_text = "**Author self-review**: I reviewed the PR code suggestions, applied the relevant ones, and explained any intentionally skipped suggestions."

# Commit-ready suggestions, if supported by the current Qodo plan.

commitable_code_suggestions = true
dual_publishing_score_threshold = 7

extra_instructions = '''
Suggest changes only for changed PR code.

Keep suggestions focused and practical.
Do not maximize output volume.
Do not produce cosmetic suggestions unless no meaningful issue exists.

Before publishing a suggestion, verify:

* it is based on changed code
* it solves a real problem
* it is not just style preference
* it does not bypass required Frappe hooks
* it preserves permissions
* it preserves submit/cancel semantics
* it does not rely on unverified assumptions
* it is safe to paste, or clearly marked as pseudocode

Prioritize suggestions for:

* duplicate MOP Log prevention
* voucher-scoped source queries
* DB calls inside loops
* unsafe SQL
* unbounded queries
* doc.save/doc.submit/doc.cancel loops
* frontend waterfall calls
* async JS validation races
* unsafe permission bypass
* tooling path/branch/exclude mistakes
* missing final newline
* noisy push/review automation
* excessive suggestion-generation settings

Every suggestion must include:

* what to change
* why it is safe
* what to verify
* concrete author action

Impact labels:

* High only for security, data integrity, broken runtime behavior, or hot-path performance.
* Medium for maintainability, tooling correctness, or likely performance risk.
* Low for local cleanup.

Do not suggest broad architecture rewrites unless the changed code introduces a serious runtime risk.
'''

############################################################

# Optional Changelog

############################################################

[pr_update_changelog]
add_pr_link = true
skip_ci_on_push = true

extra_instructions = '''
Update changelog only for user-visible or developer-visible changes.
Do not add changelog entries for pure formatting unless the repository convention requires it.
Include the PR link.
'''